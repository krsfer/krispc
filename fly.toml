app = "krispc"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[mounts]
  source = "krispc_data"
  destination = "/data"

[env]
  PORT = "8080"
  PYTHONUNBUFFERED = "1"
  FLY_APP = "true"
  KRISPC_READY_FILE = "/tmp/krispc-ready"

[processes]
  app = "./start-fly-app.sh"

[[services]]
  internal_port = 8080
  protocol = "tcp"
  processes = ["app"]
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.checks]]
    interval = "10s"
    timeout = "2s"
    grace_period = "30s"
    method = "GET"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
  processes = ["app"]
