{% load i18n %}

<section id="services" class="py-16">
    <div id="the-preamble" style="display:none">{% trans "PTR_6010" %}</div>

    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="mb-10">
            <p class="text-xs uppercase tracking-[0.35em] text-stone-400 font-semibold">KrisPC</p>
            <h2 class="mt-3 text-3xl sm:text-4xl font-brand text-stone-900">{% trans 'PTR_0170' %}</h2>
        </div>

        <div class="accordion" id="prods_accordion">
            <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
                {% for prod in prods %}
                    <div id="prod_{{ forloop.counter0 }}"
                         class="rounded-2xl border border-stone-200/80 bg-white/80 p-6 shadow-sm">
                        <div class="flex items-start justify-between">
                            <div class="flex items-center gap-3 text-stone-700">
                                <span class="h-10 w-10 rounded-xl bg-stone-100 flex items-center justify-center">
                                    <i class="{{ prod.Prd_Icon }}"></i>
                                </span>
                                <h3 class="text-lg font-semibold text-stone-900">{{ prod.Prd_Name|safe }}</h3>
                            </div>
                        </div>

                        <div class="mt-4 text-sm text-stone-600">{{ prod.Prd_Desc|safe }}</div>

                        <div class="mt-5">
                            <button class="inline-flex items-center text-sm font-semibold text-primary hover:text-primary-dark"
                                data-bs-toggle="collapse" data-bs-target="#order-collapse_{{ forloop.counter0 }}"
                                aria-expanded="false" aria-controls="order-collapse_{{ forloop.counter0 }}">
                                {% trans "PTR_0050" %}
                            </button>
                            <div class="collapse" id="order-collapse_{{ forloop.counter0 }}">
                                <div class="mt-3 flex flex-wrap gap-2">
                                    <a class='com-btn inline-flex items-center justify-center h-9 px-4 rounded-lg border border-stone-200 text-sm font-semibold text-stone-700 hover:border-stone-300'
                                        onclick="scrolllTo('contact-form-id','{{ locale }}','{{ prod.Prd_Name|safe }}')">
                                        &nbsp;<span class="cls-message">Message</span>&nbsp;
                                    </a>
                                    <a class='com-btn inline-flex items-center justify-center h-9 px-4 rounded-lg border border-stone-200 text-sm font-semibold text-stone-700 hover:border-stone-300'
                                        onclick="sendSMS('{{ prod.Prd_Name|safe }}')">
                                        &nbsp;<span class="cls-sms">SMS</span>&nbsp;
                                    </a>
                                    <a class='com-btn inline-flex items-center justify-center h-9 px-4 rounded-lg border border-stone-200 text-sm font-semibold text-stone-700 hover:border-stone-300'
                                        href="tel:+33-6-19-67-03-56">
                                        &nbsp;<span class="cls-call">{% trans "Call" %}</span>&nbsp;
                                    </a>
                                </div>
                            </div>
                        </div>

                        <div class="mt-5">
                            <h2 class="accordion-header" id="heading_{{ forloop.counter0 }}">
                                <button class="text-sm font-semibold text-stone-600 hover:text-stone-900"
                                        type="button" data-bs-toggle="collapse"
                                        data-bs-target="#collapse_{{ forloop.counter0 }}"
                                        aria-expanded="false" aria-controls="collapse_{{ forloop.counter0 }}">
                                    {% trans 'PTR_0150' %}
                                </button>
                            </h2>
                            <div id="collapse_{{ forloop.counter0 }}" class="collapse"
                                 aria-labelledby="heading_{{ forloop.counter0 }}"
                                 data-bs-parent="#prods_accordion">
                                <div class="mt-3 text-sm text-stone-600">{{ prod.Prd_More|safe }}</div>
                            </div>
                        </div>
                    </div>
                {% endfor %}
            </div>
        </div>
    </div>
</section>
